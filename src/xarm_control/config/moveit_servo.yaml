# MoveIt Servo configuration for xarm7 keyboard teleoperation
# Loaded by moveit_servo_node launch file.

## Input command type
# "speed_units" → values in m/s and rad/s (matches MoveitServo node outputs)
command_in_type: "speed_units"

## Cartesian / joint speed scaling (only used when command_in_type=="unitless")
scale:
  linear:     0.4   # m/s
  rotational: 0.8   # rad/s
  joint:      0.5   # rad/s

## Output rate
publish_period: 0.034        # ~30 Hz
low_latency_mode: true       # publish immediately on incoming command

## What controller topic to write to
command_out_type: trajectory_msgs/JointTrajectory
command_out_topic: /xarm7_traj_controller/joint_trajectory

## What to publish
publish_joint_positions:     true
publish_joint_velocities:    false
publish_joint_accelerations: false

## Joint state input
low_pass_filter_coeff: 2.0
joint_topic: /joint_states

## MoveIt planning group and frames
move_group_name:          xarm7
planning_frame:           link_base
ee_frame_name:            link_eef
robot_link_command_frame: link_base

## Topic names (servo_server uses these)
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic:     ~/delta_joint_cmds
status_topic:               ~/status

## Timeout: stop if no command received within this many seconds
incoming_command_timeout: 0.2
num_outgoing_halt_msgs_to_publish: 4

## Singularity handling
lower_singularity_threshold:            17.0
hard_stop_singularity_threshold:        30.0
leaving_singularity_threshold_multiplier: 2.0

## Joint limit buffer (radians)
joint_limit_margins: [0.12]

## Collision checking
check_collisions: true
collision_check_rate: 10.0
collision_check_type: threshold_distance
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
collision_distance_safety_factor: 1000.0
min_allowable_collision_distance: 0.01
